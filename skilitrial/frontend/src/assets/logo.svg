<svg width="160" height="50" viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Arc — now purple gradient -->
  <path d="M130 40 Q250 -10 370 40"
        stroke="url(#arcGrad)"
        stroke-width="16"
        fill="none"
        stroke-linecap="round"/>

  <!-- Accent dots — keep warm but slightly softer -->
  <rect x="205" y="50" width="18" height="18" rx="4" fill="#f4b942"/>
  <rect x="320" y="50" width="18" height="18" rx="4" fill="#f4b942"/>

  <!-- Brand Name — white/light on dark -->
  <text x="20" y="115"
        font-size="72"
        font-weight="700"
        font-family="Segoe UI, Arial, sans-serif"
        fill="url(#textGrad)">
        Skilitrial
  </text>

</svg>